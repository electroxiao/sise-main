services:
  redis:
    image: "${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7-alpine}"
    restart: unless-stopped
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      target: development
      args:
        NODE_IMAGE: "${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}"
        NPM_CONFIG_REGISTRY: "${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}"
    working_dir: /app
    command: sh -lc "npm install && npm run dev"
    restart: unless-stopped
    volumes:
      - ./server:/app
    ports:
      - "2567:2567"
    environment:
      PORT: "2567"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      MIN_PLAYERS: "${MIN_PLAYERS:-1}"
      BOT_THINK_MIN_MS: "${BOT_THINK_MIN_MS:-1800}"
      BOT_THINK_MAX_MS: "${BOT_THINK_MAX_MS:-3200}"
      LOCAL_TRANSITION_DELAY_MS: "${LOCAL_TRANSITION_DELAY_MS:-5000}"
      ROOM_LOG: "${ROOM_LOG:-1}"
      HU_LOG: "${HU_LOG:-1}"
      ROOM_STATE_LOG_MODE: "${ROOM_STATE_LOG_MODE:-compact}"
    depends_on:
      - redis

  client:
    build:
      context: ./client
      target: development
      args:
        NODE_IMAGE: "${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}"
        NPM_CONFIG_REGISTRY: "${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}"
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    restart: unless-stopped
    volumes:
      - ./client:/app
    ports:
      - "3000:80"
    environment:
      VITE_SERVER_URL: "${VITE_SERVER_URL:-}"
      VITE_SERVER_HTTP_URL: "${VITE_SERVER_HTTP_URL:-}"
    depends_on:
      - server
